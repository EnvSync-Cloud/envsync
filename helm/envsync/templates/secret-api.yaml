apiVersion: v1
kind: Secret
metadata:
  name: {{ include "envsync.apiSecretName" . }}
  labels:
    {{- include "envsync.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_USER: {{ include "envsync.appDatabaseUser" . | quote }}
  DATABASE_PASSWORD: {{ include "envsync.appDatabasePassword" . | quote }}
  S3_ACCESS_KEY: {{ include "envsync.s3AccessKey" . | quote }}
  S3_SECRET_KEY: {{ include "envsync.s3SecretKey" . | quote }}
  SMTP_USER: {{ .Values.smtp.user | quote }}
  SMTP_PASS: {{ .Values.smtp.pass | quote }}
  {{- if .Values.minikms.tlsCaCert }}
  MINIKMS_TLS_CA_CERT: {{ .Values.minikms.tlsCaCert | quote }}
  {{- end }}
