apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "envsync.fullname" . }}-api
  labels:
    {{- include "envsync.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "envsync.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "envsync.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
        {{- with .Values.api.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/api-config: {{ include (print $.Template.BasePath "/configmap-api.yaml") . | sha256sum }}
        checksum/api-secret: {{ include (print $.Template.BasePath "/secret-api.yaml") . | sha256sum }}
        checksum/bootstrap-secret: {{ include (print $.Template.BasePath "/secret-bootstrap.yaml") . | sha256sum }}
        {{- with .Values.global.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.api.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "envsync.runtimeServiceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-bootstrap
          image: "{{ .Values.bootstrap.kubectlImage.repository }}:{{ .Values.bootstrap.kubectlImage.tag }}"
          imagePullPolicy: {{ .Values.bootstrap.kubectlImage.pullPolicy }}
          command:
            - /bin/sh
            - -ec
            - |
              until [ "$(kubectl get configmap {{ include "envsync.bootstrapLockName" . }} -o jsonpath='{.data.status}' 2>/dev/null || true)" = "complete" ]; do
                echo "Waiting for bootstrap lock to reach complete..."
                sleep 5
              done
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          command: ["bun", "run", "src/entrypoint.ts"]
          ports:
            - name: http
              containerPort: {{ .Values.api.service.port }}
          envFrom:
            - configMapRef:
                name: {{ include "envsync.apiConfigMapName" . }}
            - secretRef:
                name: {{ include "envsync.apiSecretName" . }}
            - secretRef:
                name: {{ include "envsync.bootstrapSecretName" . }}
          {{- with .Values.api.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 60
            periodSeconds: 5
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
