apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "envsync.runtimeServiceAccountName" . }}
  labels:
    {{- include "envsync.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["{{ include "envsync.bootstrapLockName" . }}"]
    verbs: ["get"]
