apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "envsync.bootstrapServiceAccountName" . }}
  labels:
    {{- include "envsync.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["{{ include "envsync.bootstrapSecretName" . }}"]
    verbs: ["get", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["{{ include "envsync.bootstrapLockName" . }}"]
    verbs: ["get", "update", "patch"]
