{{- $existing := lookup "v1" "Secret" .Release.Namespace (include "envsync.bootstrapSecretName" .) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "envsync.bootstrapSecretName" . }}
  labels:
    {{- include "envsync.labels" . | nindent 4 }}
type: Opaque
stringData:
  ZITADEL_PAT: {{ get (default dict $existing.data) "ZITADEL_PAT" | default "" | b64dec | quote }}
  ZITADEL_WEB_CLIENT_ID: {{ get (default dict $existing.data) "ZITADEL_WEB_CLIENT_ID" | default "" | b64dec | quote }}
  ZITADEL_WEB_CLIENT_SECRET: {{ get (default dict $existing.data) "ZITADEL_WEB_CLIENT_SECRET" | default "" | b64dec | quote }}
  ZITADEL_CLI_CLIENT_ID: {{ get (default dict $existing.data) "ZITADEL_CLI_CLIENT_ID" | default "" | b64dec | quote }}
  ZITADEL_CLI_CLIENT_SECRET: {{ get (default dict $existing.data) "ZITADEL_CLI_CLIENT_SECRET" | default "" | b64dec | quote }}
  ZITADEL_API_CLIENT_ID: {{ get (default dict $existing.data) "ZITADEL_API_CLIENT_ID" | default "" | b64dec | quote }}
  ZITADEL_API_CLIENT_SECRET: {{ get (default dict $existing.data) "ZITADEL_API_CLIENT_SECRET" | default "" | b64dec | quote }}
  OPENFGA_STORE_ID: {{ get (default dict $existing.data) "OPENFGA_STORE_ID" | default "" | b64dec | quote }}
  OPENFGA_MODEL_ID: {{ get (default dict $existing.data) "OPENFGA_MODEL_ID" | default "" | b64dec | quote }}
