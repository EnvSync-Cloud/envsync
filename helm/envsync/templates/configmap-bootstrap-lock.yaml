{{- $existing := lookup "v1" "ConfigMap" .Release.Namespace (include "envsync.bootstrapLockName" .) -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "envsync.bootstrapLockName" . }}
  labels:
    {{- include "envsync.labels" . | nindent 4 }}
data:
  status: {{ index (default dict $existing.data) "status" | default "pending" | quote }}
  completedAt: {{ index (default dict $existing.data) "completedAt" | default "" | quote }}
  releaseRevision: {{ printf "%v" .Release.Revision | quote }}
