name: Build & Test

on:
  push:
    branches:
      - main
      - dev
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun Runtime
        uses: oven-sh/setup-bun@v2
      - run: bun i
      - run: bun run build

  build-cli:
    name: Build CLI (Go)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go toolchain
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: packages/envsync-cli/go.sum
      - name: Build CLI binary
        run: go build -ldflags="-s -w" -o /dev/null ./cmd/cli/main.go
        working-directory: packages/envsync-cli
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
      - name: Run go vet
        run: go vet ./...
        working-directory: packages/envsync-cli

  test-mock:
    name: Mock Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: envsync_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: envsync_test
      CACHE_ENV: development
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun Runtime
        uses: oven-sh/setup-bun@v2
      - run: bun i
      - name: Run mock tests
        run: bun run test:mock
        working-directory: packages/envsync-api

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: envsync_e2e_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      openfga-db:
        image: postgres:17
        env:
          POSTGRES_USER: openfga
          POSTGRES_PASSWORD: openfga
          POSTGRES_DB: openfga
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U openfga"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      zitadel-db:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      minikms-db:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: minikms
        ports:
          - 5435:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: envsync_e2e_test
      CACHE_ENV: development
      OPENFGA_API_URL: http://localhost:8090
      ZITADEL_URL: http://localhost:8080
      MINIKMS_GRPC_ADDR: localhost:50051
      MINIKMS_TLS_ENABLED: "false"
      SKIP_ROOT_ENV: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun Runtime
        uses: oven-sh/setup-bun@v2
      - name: Setup Go toolchain
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: packages/envsync-cli/go.sum
      - run: bun i

      - name: Run miniKMS database migrations
        run: |
          PGPASSWORD=postgres psql -h localhost -p 5435 -U postgres -d minikms \
            -f docker/minikms/migrations/001_initial_schema.sql
          PGPASSWORD=postgres psql -h localhost -p 5435 -U postgres -d minikms \
            -f docker/minikms/migrations/002_vault_storage.sql

      - name: Start miniKMS
        run: |
          docker run -d --name minikms --network host \
            -e MINIKMS_DB_URL="postgres://postgres:postgres@localhost:5435/minikms?sslmode=disable" \
            -e MINIKMS_REDIS_URL="redis://localhost:6379/1" \
            -e MINIKMS_ROOT_KEY="a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2" \
            -e MINIKMS_GRPC_ADDR="0.0.0.0:50051" \
            ghcr.io/envsync-cloud/minikms:latest

      - name: Wait for miniKMS to be ready
        run: |
          for i in $(seq 1 30); do
            if docker exec minikms /bin/sh -c "echo > /dev/tcp/localhost/50051" 2>/dev/null; then
              echo "miniKMS is ready"
              exit 0
            fi
            # Fallback: check if port is open from host
            if nc -z localhost 50051 2>/dev/null; then
              echo "miniKMS is ready (port check)"
              exit 0
            fi
            echo "Waiting for miniKMS... ($i/30)"
            sleep 2
          done
          echo "miniKMS failed to start"
          docker logs minikms
          exit 1

      - name: Run OpenFGA migrations
        run: |
          docker run --rm --network host \
            -e OPENFGA_DATASTORE_ENGINE=postgres \
            -e OPENFGA_DATASTORE_URI="postgres://openfga:openfga@localhost:5433/openfga?sslmode=disable" \
            openfga/openfga:latest migrate

      - name: Start OpenFGA server
        run: |
          docker run -d --name openfga --network host \
            -e OPENFGA_DATASTORE_ENGINE=postgres \
            -e OPENFGA_DATASTORE_URI="postgres://openfga:openfga@localhost:5433/openfga?sslmode=disable" \
            -e OPENFGA_HTTP_ADDR=0.0.0.0:8090 \
            -e OPENFGA_GRPC_ADDR=0.0.0.0:8091 \
            openfga/openfga:latest run

      - name: Wait for OpenFGA to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8090/healthz > /dev/null 2>&1; then
              echo "OpenFGA is ready"
              exit 0
            fi
            echo "Waiting for OpenFGA... ($i/30)"
            sleep 2
          done
          echo "OpenFGA failed to start"
          docker logs openfga
          exit 1

      - name: Start Mailpit
        run: |
          docker run -d --name mailpit --network host \
            axllent/mailpit:latest \
            --smtp 0.0.0.0:1025 \
            --listen 0.0.0.0:8025

      - name: Wait for Mailpit to be ready
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8025/ > /dev/null 2>&1; then
              echo "Mailpit is ready"
              exit 0
            fi
            echo "Waiting for Mailpit... ($i/15)"
            sleep 2
          done
          echo "Mailpit failed to start"
          docker logs mailpit
          exit 1

      - name: Start Zitadel
        run: |
          mkdir -p /tmp/zitadel
          docker run -d --name zitadel --network host --user 0 \
            -v /tmp/zitadel:/current-dir \
            -e ZITADEL_EXTERNALDOMAIN=localhost \
            -e ZITADEL_EXTERNALSECURE=false \
            -e ZITADEL_TLS_ENABLED=false \
            -e ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED=false \
            -e ZITADEL_DATABASE_POSTGRES_HOST=localhost \
            -e ZITADEL_DATABASE_POSTGRES_PORT=5434 \
            -e ZITADEL_DATABASE_POSTGRES_DATABASE=zitadel \
            -e ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME=postgres \
            -e ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD=postgres \
            -e ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE=disable \
            -e ZITADEL_DATABASE_POSTGRES_USER_USERNAME=zitadel \
            -e ZITADEL_DATABASE_POSTGRES_USER_PASSWORD=zitadel \
            -e ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE=disable \
            -e ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED=false \
            -e ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME=zitadel-admin \
            -e ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD=Password1! \
            -e ZITADEL_FIRSTINSTANCE_ORG_NAME=EnvSync \
            -e ZITADEL_FIRSTINSTANCE_PATPATH=/current-dir/admin.pat \
            -e ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME=admin \
            -e ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME="EnvSync IAM Owner" \
            -e "ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE=2029-01-01T00:00:00Z" \
            -e ZITADEL_FIRSTINSTANCE_LOGINCLIENTPATPATH=/current-dir/login-client.pat \
            -e ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_USERNAME=login-client \
            -e ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_NAME="Automatically Initialized IAM_LOGIN_CLIENT" \
            -e "ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_PAT_EXPIRATIONDATE=2029-01-01T00:00:00Z" \
            -e ZITADEL_MASTERKEY=MasterkeyNeedsToHave32Characters \
            ghcr.io/zitadel/zitadel:latest start-from-init --masterkey MasterkeyNeedsToHave32Characters

      - name: Wait for Zitadel to be ready
        run: |
          for i in $(seq 1 120); do
            if [ "$(docker inspect -f '{{.State.Status}}' zitadel 2>/dev/null || echo missing)" = "exited" ]; then
              echo "Zitadel container exited early"
              docker inspect zitadel
              docker logs zitadel
              exit 1
            fi
            if docker exec zitadel /app/zitadel ready > /dev/null 2>&1; then
              echo "Zitadel is ready"
              exit 0
            fi
            echo "Waiting for Zitadel... ($i/120)"
            sleep 5
          done
          echo "Zitadel failed to start"
          docker ps -a
          docker logs zitadel
          exit 1

      - name: Read Zitadel admin PAT
        run: |
          for i in $(seq 1 10); do
            ADMIN_PAT=$(cat /tmp/zitadel/admin.pat 2>/dev/null || true)
            LOGIN_PAT=$(cat /tmp/zitadel/login-client.pat 2>/dev/null || true)
            if [ -n "$ADMIN_PAT" ] && [ -n "$LOGIN_PAT" ]; then
              echo "ZITADEL_PAT=${ADMIN_PAT}" >> $GITHUB_ENV
              echo "ZITADEL_LOGIN_PAT=${LOGIN_PAT}" >> $GITHUB_ENV
              echo "Zitadel admin and login-client PATs read successfully"
              exit 0
            fi
            echo "Waiting for Zitadel PAT files... ($i/10)"
            sleep 3
          done
          echo "Failed to read Zitadel PAT files"
          exit 1

      - name: Bootstrap Zitadel for E2E
        run: |
          bun -e "
            import { bootstrapZitadelProject } from './packages/envsync-api/tests/e2e/helpers/zitadel-bootstrap';
            import fs from 'fs';
            const result = await bootstrapZitadelProject('http://localhost:8080', process.env.ZITADEL_PAT);
            fs.appendFileSync(process.env.GITHUB_ENV, 'ZITADEL_E2E_CLIENT_ID=' + result.appClientId + '\n');
            fs.appendFileSync(process.env.GITHUB_ENV, 'ZITADEL_E2E_CLIENT_SECRET=' + result.appClientSecret + '\n');
            console.log('Zitadel bootstrapped: project=' + result.projectId + ', clientId=' + result.appClientId);
          "
        env:
          ZITADEL_PAT: ${{ env.ZITADEL_PAT }}

      - name: Run E2E tests
        run: bun run test:e2e
        working-directory: packages/envsync-api
        env:
          ZITADEL_URL: http://localhost:8080
          ZITADEL_PAT: ${{ env.ZITADEL_PAT }}
          ZITADEL_LOGIN_PAT: ${{ env.ZITADEL_LOGIN_PAT }}
          ZITADEL_E2E_CLIENT_ID: ${{ env.ZITADEL_E2E_CLIENT_ID }}
          ZITADEL_E2E_CLIENT_SECRET: ${{ env.ZITADEL_E2E_CLIENT_SECRET }}

  build-api-image:
    name: Build & Push API Image
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/envsync-cloud/envsync-api
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: packages/envsync-api
          file: packages/envsync-api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
